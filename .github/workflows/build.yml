name: build-submission-image

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: "GGUF model URL to bake in"
        required: false
        default: ""
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/davidortsac/frugal-router:latest
            ghcr.io/davidortsac/frugal-router:${{ github.sha }}
          build-args: |
            ${{ github.event.inputs.model_url != '' && format('MODEL_URL={0}', github.event.inputs.model_url) || '' }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}

      - name: Report compressed size
        run: |
          docker manifest inspect ghcr.io/davidortsac/frugal-router:latest \
            | python3 -c "import json,sys; d=json.load(sys.stdin); layers=d.get('layers') or d['manifests']; print('total compressed bytes:', sum(l.get('size',0) for l in layers) if isinstance(layers[0].get('size',0), int) else 'see registry')"
